    <h1>About HasteClient</h1>
    <hr>
    <p>HasteClient is a Tkinter based Hastebin client.<br>
    HasteClient has the following features:<br>
    1: Post Hastes <br>
    2: Get Hastes <br>
    3: Save Hastes <br>
    4: Open saved Hastes <br>
    5: Configurable haste website <br></p>
